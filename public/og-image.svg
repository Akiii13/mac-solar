<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>MAC Solar — Power Your Home With the Sun</title>
  <desc>MAC Solar Installation Services. Free Solar Assessment. Leyte, Eastern Visayas, Region 8.</desc>

  <defs>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="white" stroke-width="0.6" opacity="0.10"/>
    </pattern>
  </defs>

  <!-- Base background: brand royal blue -->
  <rect width="1200" height="630" fill="#1D4ED8"/>

  <!-- Grid overlay matching the site's bg-grid-pattern -->
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Depth shadow — top left corner (matches site hero) -->
  <ellipse cx="-80" cy="80" rx="380" ry="380" fill="#1e3a8a" opacity="0.55"/>

  <!-- Depth shadow — bottom right corner -->
  <ellipse cx="1300" cy="640" rx="300" ry="300" fill="#1e3a8a" opacity="0.45"/>

  <!-- Sun glow layers — upper right (mirrors site hero solar-500 glow) -->
  <circle cx="990" cy="155" r="360" fill="#F59E0B" opacity="0.07"/>
  <circle cx="990" cy="155" r="250" fill="#F59E0B" opacity="0.10"/>
  <circle cx="990" cy="155" r="165" fill="#FBBF24" opacity="0.13"/>

  <!-- Sun rays (8 spokes, rotated around sun center) -->
  <g transform="translate(990, 155)">
    <rect x="-9" y="-215" width="18" height="75" rx="9" fill="#FBBF24" opacity="0.45"/>
    <rect x="-9" y="-215" width="18" height="75" rx="9" fill="#FBBF24" opacity="0.45" transform="rotate(45)"/>
    <rect x="-9" y="-215" width="18" height="75" rx="9" fill="#FBBF24" opacity="0.45" transform="rotate(90)"/>
    <rect x="-9" y="-215" width="18" height="75" rx="9" fill="#FBBF24" opacity="0.45" transform="rotate(135)"/>
    <rect x="-9" y="-215" width="18" height="75" rx="9" fill="#FBBF24" opacity="0.45" transform="rotate(180)"/>
    <rect x="-9" y="-215" width="18" height="75" rx="9" fill="#FBBF24" opacity="0.45" transform="rotate(225)"/>
    <rect x="-9" y="-215" width="18" height="75" rx="9" fill="#FBBF24" opacity="0.45" transform="rotate(270)"/>
    <rect x="-9" y="-215" width="18" height="75" rx="9" fill="#FBBF24" opacity="0.45" transform="rotate(315)"/>
  </g>

  <!-- Sun body -->
  <circle cx="990" cy="155" r="88" fill="#FBBF24" opacity="0.88"/>
  <circle cx="990" cy="155" r="62" fill="#FDE68A"/>

  <!-- Secondary gold accent bottom-left (mirrors site design) -->
  <circle cx="60" cy="580" r="160" fill="#F59E0B" opacity="0.07"/>

  <!-- Badge pill: "CERTIFIED SOLAR INSTALLERS" -->
  <rect x="80" y="116" width="322" height="40" rx="20" fill="#FBBF24" opacity="0.14"/>
  <rect x="80" y="116" width="322" height="40" rx="20" fill="none" stroke="#FBBF24" stroke-width="1" opacity="0.45"/>
  <!-- Small sun icon dot in badge -->
  <circle cx="108" cy="136" r="7" fill="#FBBF24" opacity="0.9"/>
  <text x="126" y="141" fill="#FBBF24" font-size="13" font-weight="700" font-family="system-ui,-apple-system,sans-serif" letter-spacing="0.07em">CERTIFIED SOLAR INSTALLERS</text>

  <!-- Headline line 1: white -->
  <text x="80" y="255" fill="#FFFFFF" font-size="80" font-weight="800" font-family="system-ui,-apple-system,sans-serif" letter-spacing="-0.025em">Power Your Home</text>

  <!-- Headline line 2: solar gold -->
  <text x="80" y="350" fill="#FBBF24" font-size="80" font-weight="800" font-family="system-ui,-apple-system,sans-serif" letter-spacing="-0.025em">With the Sun.</text>

  <!-- Subtitle -->
  <text x="80" y="415" fill="rgba(255,255,255,0.60)" font-size="26" font-family="system-ui,-apple-system,sans-serif">Free Solar Assessment · Leyte, Eastern Visayas</text>

  <!-- Thin horizontal divider -->
  <line x1="80" y1="468" x2="500" y2="468" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>

  <!-- Company name — MAC (white) + Solar (gold) -->
  <text x="80" y="536" fill="#FFFFFF" font-size="42" font-weight="800" font-family="system-ui,-apple-system,sans-serif" letter-spacing="-0.01em">MAC</text>
  <text x="182" y="536" fill="#FBBF24" font-size="42" font-weight="800" font-family="system-ui,-apple-system,sans-serif" letter-spacing="-0.01em">Solar</text>

  <!-- URL -->
  <text x="80" y="576" fill="rgba(255,255,255,0.32)" font-size="18" font-family="system-ui,-apple-system,sans-serif">mac-solar.vercel.app</text>

  <!-- Region badge — bottom right -->
  <rect x="900" y="536" width="226" height="40" rx="20" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.14)" stroke-width="1"/>
  <text x="1013" y="561" fill="rgba(255,255,255,0.45)" font-size="14" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle">Region 8 · Eastern Visayas</text>

</svg>
